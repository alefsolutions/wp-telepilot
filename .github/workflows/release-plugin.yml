name: Release Plugin

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          VERSION="$(sed -n 's/^ \* Version: //p' wp-telepilot.php | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Could not determine plugin version from wp-telepilot.php" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        id: package
        run: |
          set -euo pipefail
          STAGING_DIR="$RUNNER_TEMP/package"
          PLUGIN_DIR="$STAGING_DIR/wp-telepilot"
          ZIP_PATH="$RUNNER_TEMP/wp-telepilot-${{ steps.version.outputs.version }}.zip"

          rm -rf "$STAGING_DIR" "$ZIP_PATH"
          mkdir -p "$PLUGIN_DIR"

          rsync -a ./ "$PLUGIN_DIR/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude 'README.md'

          cd "$STAGING_DIR"
          zip -r "$ZIP_PATH" "wp-telepilot"

          echo "Created package at $ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Sync release tag
        run: |
          git tag -f "${{ steps.version.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}" --force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WP Telepilot ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ steps.package.outputs.zip_path }}
          overwrite_files: true
